<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="css/game.css">
</head>
<body>
    <nav>
        <a class="logo" href="index.html">Kennedy Bateman</a>
        <div>
            <a href="index.html#about">About</a>
            <a href="index.html#resume">Resume</a>
            <a href="scratch.html">Interest</a>
            <a href="game.html">Game</a>
        </div>
    </nav>

    <div class="hero">
        <h1>Snake Game</h1>
        <p>Use arrow keys to move. Eat the food. Don't hit the walls!</p>
    </div>

    <!-- PUT THE NEW STUFF HERE -->
    <div class="game-container">
        <div class="score-bar">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>
            <button class="btn" onclick="window.location.href='index.html#about'">Back to Home</button>
        </div>
        <div id="game-over">
    Game Over! Your score: <span id="final-score"></span>
    <br><br>
    <button class="btn" onclick="startGame()">Play Again</button>
</div>
    </div>
    <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const box = 20;
    let snake, food, direction, score, gameLoop;

    function startGame() {
        document.getElementById('game-over').style.display = 'none';
        snake = [{x: 9*box, y: 9*box}];
        direction = 'RIGHT';
        score = 0;
        document.getElementById('score').textContent = score;
        food = spawnFood();
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(draw, 150);
    }

    function spawnFood() {
        return {
            x: Math.floor(Math.random() * 20) * box,
            y: Math.floor(Math.random() * 20) * box
        };
    }

    document.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
        e.preventDefault();
    }
    if (e.key === 'ArrowUp' && direction !== 'DOWN') direction = 'UP';
    else if (e.key === 'ArrowDown' && direction !== 'UP') direction = 'DOWN';
    else if (e.key === 'ArrowLeft' && direction !== 'RIGHT') direction = 'LEFT';
    else if (e.key === 'ArrowRight' && direction !== 'LEFT') direction = 'RIGHT';
});

    function draw() {
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Move snake
        let head = {x: snake[0].x, y: snake[0].y};
        if (direction === 'UP') head.y -= box;
        if (direction === 'DOWN') head.y += box;
        if (direction === 'LEFT') head.x -= box;
        if (direction === 'RIGHT') head.x += box;

        // Check collision with walls or self
        if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height ||
            snake.some(s => s.x === head.x && s.y === head.y)) {
            clearInterval(gameLoop);
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'block';
            return;
        }

        snake.unshift(head);

        // Check food
        if (head.x === food.x && head.y === food.y) {
            score++;
            document.getElementById('score').textContent = score;
            food = spawnFood();
        } else {
            snake.pop();
        }

        // Draw snake
        snake.forEach((s, i) => {
            ctx.fillStyle = i === 0 ? '#2c5f8a' : '#95b9ee';
            ctx.fillRect(s.x, s.y, box-2, box-2);
            ctx.strokeStyle = 'white';
            ctx.strokeRect(s.x, s.y, box-2, box-2);
        });

        // Draw food
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(food.x, food.y, box-2, box-2);
    }

    // Draw initial empty board
    ctx.fillStyle = 'white';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
